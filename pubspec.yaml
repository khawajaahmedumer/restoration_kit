name: restoration_kit
description: >-
  Effortless state restoration: survive process death without
  RestorationMixin ceremony. One builder widget, drop-in controllers,
  and a debug guardian for Android's 1 MB limit.
version: 0.1.1
homepage: https://github.com/khawajaahmedumer/restoration_kit
repository: https://github.com/khawajaahmedumer/restoration_kit
issue_tracker: https://github.com/khawajaahmedumer/restoration_kit/issues

topics:
  - state-restoration
  - state
  - persistence
  - lifecycle

environment:
  sdk: ^3.4.0
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
